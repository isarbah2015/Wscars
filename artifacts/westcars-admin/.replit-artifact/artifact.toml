kind = "web"
previewPath = "/admin-dashboard/"
title = "Westcars Admin Dashboard"
version = "1.0.0"
id = "artifacts/westcars-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin-dashboard/" ]
localPort = 24648

[services.development]
run = "pnpm --filter @workspace/westcars-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/westcars-admin", "run", "build" ]
publicDir = "artifacts/westcars-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24648"
BASE_PATH = "/admin-dashboard/"
