name: EAS OTA Update (Production)

on:
  push:
    branches:
      - main
    paths:
      # JS/TS source and asset files — changes here are OTA-safe.
      # Native config changes (package.json, app.json, eas.json, etc.)
      # are handled by eas-build.yml instead so both workflows don't fire
      # for the same push.
      - 'artifacts/westcars/app/**'
      - 'artifacts/westcars/assets/**'
      - 'artifacts/westcars/components/**'
      - 'artifacts/westcars/constants/**'
      - 'artifacts/westcars/context/**'
      - 'artifacts/westcars/lib/**'
      - 'artifacts/westcars/services/**'
      - 'artifacts/westcars/types/**'
      - 'artifacts/westcars/utils/**'
      - 'artifacts/westcars/expo-env.d.ts'
      - 'artifacts/westcars/tsconfig.json'
      - '.github/workflows/eas-update.yml'
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message (shown in Expo dashboard)'
        required: false
        default: 'Manual OTA update'
      branch:
        description: 'EAS update branch'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development

# Shared concurrency group with eas-build.yml.
# cancel-in-progress: false means OTA update will NOT cancel a full build
# that is already running in this group. The build always takes precedence.
# (eas-build.yml uses cancel-in-progress: true, so a new build will cancel
#  any in-progress OTA update — the direction of control is intentionally
#  asymmetric: build > OTA.)
concurrency:
  group: westcars-eas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-changes:
    name: Detect native file changes
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.native-check.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if native files changed
        id: native-check
        run: |
          # On workflow_dispatch (manual run), never skip — always publish OTA.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — OTA update will proceed."
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # These are the same files that trigger eas-build.yml on push.
          # If any are present in this commit, the full build handles it
          # and OTA is redundant.
          NATIVE_PATTERNS="^artifacts/westcars/(package\.json|package-lock\.json|app\.json|eas\.json|babel\.config\.[jt]s|metro\.config\.[jt]s|google-services\.json|firebase\.json|firestore\.(rules|indexes\.json)|storage\.rules|scripts/)"

          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'artifacts/westcars/')
          echo "Changed files in artifacts/westcars/:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE "$NATIVE_PATTERNS"; then
            echo "Native files changed — skipping OTA update (full build will handle this push)."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "JS-only changes detected — OTA update will proceed."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  ota-update:
    name: Publish OTA Update
    needs: check-changes
    if: needs.check-changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/westcars

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::Missing required GitHub secret: EXPO_TOKEN"
            echo "Set it under: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "EXPO_TOKEN is present."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        run: pnpm add -g eas-cli

      - name: Build update message
        id: update-msg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MESSAGE=${{ github.event.inputs.message }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA="${{ github.sha }}"
            SHORT_SHA="${SHORT_SHA:0:7}"
            COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
            echo "MESSAGE=${COMMIT_MSG} (${SHORT_SHA})" >> $GITHUB_OUTPUT
          fi

      - name: Publish OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: '1'
        run: |
          BRANCH="${{ github.event.inputs.branch || 'production' }}"
          MESSAGE="${{ steps.update-msg.outputs.MESSAGE }}"
          echo "Publishing OTA update to branch: $BRANCH"
          echo "Message: $MESSAGE"
          eas update \
            --branch "$BRANCH" \
            --message "$MESSAGE" \
            --non-interactive
