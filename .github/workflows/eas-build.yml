name: EAS Build (Android Production)

on:
  push:
    branches:
      - main
    paths:
      # Native config and dependency files — changes here require a full rebuild.
      # JS/TS-only changes are handled by eas-update.yml (OTA) instead.
      - 'artifacts/westcars/package.json'
      - 'artifacts/westcars/package-lock.json'
      - 'artifacts/westcars/app.json'
      - 'artifacts/westcars/eas.json'
      - 'artifacts/westcars/babel.config.js'
      - 'artifacts/westcars/babel.config.ts'
      - 'artifacts/westcars/metro.config.js'
      - 'artifacts/westcars/metro.config.ts'
      - 'artifacts/westcars/google-services.json'
      - 'artifacts/westcars/firebase.json'
      - 'artifacts/westcars/firestore.rules'
      - 'artifacts/westcars/storage.rules'
      - 'artifacts/westcars/firestore.indexes.json'
      - 'artifacts/westcars/scripts/**'
      - '.github/workflows/eas-build.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development

# Shared concurrency group with eas-update.yml.
# cancel-in-progress: true means a new full build cancels any OTA update
# that is already running or queued in this group — builds take precedence.
concurrency:
  group: westcars-eas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/westcars

    steps:
      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.EXPO_TOKEN }}" ]       && missing="$missing EXPO_TOKEN"
          [ -z "${{ secrets.KEYSTORE_B64 }}" ]     && missing="$missing KEYSTORE_B64"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && missing="$missing KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_PASSWORD }}" ]      && missing="$missing KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub secrets:$missing"
            echo "Set these under: Settings → Secrets and variables → Actions"
            echo "See .local/notes/eas-build-workflow.md for instructions."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        run: pnpm add -g eas-cli

      - name: Run EAS build
        id: eas-build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EAS_NO_VCS: '1'
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'android' }}"
          PROFILE="${{ github.event.inputs.profile || 'production' }}"

          # --json outputs build metadata JSON to stdout; all other progress
          # logs go to stderr and stream to the Actions log automatically.
          # Do NOT use || true — let failures propagate so the job fails fast.
          RAW=$(eas build \
            --platform "$PLATFORM" \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait \
            --json)

          # Extract the build ID from the JSON array EAS returns.
          BUILD_ID=$(echo "$RAW" | python3 -c "
import json, sys
try:
    builds = json.loads(sys.stdin.read())
    if isinstance(builds, list) and builds:
        print(builds[0]['id'])
    elif isinstance(builds, dict):
        print(builds.get('id', ''))
except Exception:
    pass
" 2>/dev/null || echo "")

          if [ -n "$BUILD_ID" ]; then
            BUILD_URL="https://expo.dev/accounts/davidsarb/projects/westcars/builds/${BUILD_ID}"
            echo "Build submitted: $BUILD_URL"
          else
            BUILD_URL="https://expo.dev/accounts/davidsarb/projects/westcars/builds"
            echo "Build submitted (ID not captured). Dashboard: $BUILD_URL"
          fi

          echo "build_id=$BUILD_ID"   >> $GITHUB_OUTPUT
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
          echo "platform=$PLATFORM"   >> $GITHUB_OUTPUT
          echo "profile=$PROFILE"     >> $GITHUB_OUTPUT

      - name: Notify team via Slack
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BUILD_URL: ${{ steps.eas-build.outputs.build_url }}
          PLATFORM: ${{ steps.eas-build.outputs.platform }}
          PROFILE: ${{ steps.eas-build.outputs.profile }}
          # Pass raw values into env vars so Python can read them safely
          # without any shell-level quoting issues.
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Skip gracefully if the webhook secret has not been configured yet.
          # To enable: add SLACK_WEBHOOK_URL to GitHub Secrets → Actions.
          # Create an Incoming Webhook at https://api.slack.com/messaging/webhooks
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret not configured — skipping Slack notification."
            echo "Add SLACK_WEBHOOK_URL to GitHub Secrets to enable build alerts."
            exit 0
          fi

          # Build the Slack payload entirely in Python so every string field
          # is JSON-encoded by the stdlib — no quoting or injection risk from
          # commit messages containing quotes, backslashes, newlines, etc.
          PAYLOAD=$(python3 - <<'PYEOF'
import json, os

build_url  = os.environ["BUILD_URL"]
platform   = os.environ["PLATFORM"]
profile    = os.environ["PROFILE"]
commit_msg = os.environ.get("COMMIT_MSG", "").splitlines()[0] if os.environ.get("COMMIT_MSG") else ""
short_sha  = os.environ["COMMIT_SHA"][:7]
actor      = os.environ["ACTOR"]
ref_name   = os.environ["REF_NAME"]
repository = os.environ["REPOSITORY"]
run_id     = os.environ["RUN_ID"]
run_url    = f"https://github.com/{repository}/actions/runs/{run_id}"

payload = {
    "text": ":hammer_and_wrench: Westcars Android build queued on EAS",
    "blocks": [
        {
            "type": "header",
            "text": {
                "type": "plain_text",
                "text": ":hammer_and_wrench: Westcars Android build queued",
                "emoji": True,
            },
        },
        {
            "type": "section",
            "text": {
                "type": "mrkdwn",
                "text": (
                    f"A new *{profile}* build for *{platform}* has been submitted to EAS "
                    "and is now building. Download the AAB from the link below once it finishes."
                ),
            },
        },
        {
            "type": "section",
            "fields": [
                {"type": "mrkdwn", "text": f"*Branch:*\n`{ref_name}`"},
                {"type": "mrkdwn", "text": f"*Commit:*\n`{short_sha}` by {actor}"},
                {"type": "mrkdwn", "text": f"*Profile:*\n{profile}"},
                {"type": "mrkdwn", "text": f"*Platform:*\n{platform}"},
            ],
        },
        {
            "type": "section",
            "text": {"type": "mrkdwn", "text": f"*Commit message:* {commit_msg}"},
        },
        {
            "type": "actions",
            "elements": [
                {
                    "type": "button",
                    "style": "primary",
                    "text": {"type": "plain_text", "text": "View build on Expo", "emoji": True},
                    "url": build_url,
                },
                {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Actions run", "emoji": True},
                    "url": run_url,
                },
            ],
        },
    ],
}
print(json.dumps(payload))
PYEOF
          )

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Slack notification sent successfully."
          else
            echo "::warning::Slack notification failed (HTTP $HTTP_STATUS). Check your SLACK_WEBHOOK_URL secret."
          fi
