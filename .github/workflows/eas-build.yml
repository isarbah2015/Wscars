name: EAS Build (Android Production)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development

concurrency:
  group: westcars-eas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build
    timeout-minutes: 120
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/westcars

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        working-directory: ${{ github.workspace }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
        run: |
          MISSING=""
          [ -z "$EXPO_TOKEN" ]                          && MISSING="$MISSING EXPO_TOKEN"
          [ -z "$KEYSTORE_B64" ]                        && MISSING="$MISSING KEYSTORE_B64"
          [ -z "$KEYSTORE_PASSWORD" ]                   && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "$KEY_PASSWORD" ]                        && MISSING="$MISSING KEY_PASSWORD"
          [ -z "$EXPO_PUBLIC_FIREBASE_API_KEY" ]        && MISSING="$MISSING EXPO_PUBLIC_FIREBASE_API_KEY"
          [ -z "$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN" ]    && MISSING="$MISSING EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN"
          [ -z "$EXPO_PUBLIC_FIREBASE_PROJECT_ID" ]     && MISSING="$MISSING EXPO_PUBLIC_FIREBASE_PROJECT_ID"
          [ -z "$EXPO_PUBLIC_FIREBASE_APP_ID" ]         && MISSING="$MISSING EXPO_PUBLIC_FIREBASE_APP_ID"
          [ -z "$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET" ] && MISSING="$MISSING EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET"
          [ -z "$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID" ] && MISSING="$MISSING EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required GitHub secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets present."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install EAS CLI
        working-directory: ${{ github.workspace }}
        run: npm install -g eas-cli

      - name: Install dependencies (npm — flat node_modules for EAS CLI)
        run: npm install --legacy-peer-deps

      - name: Generate credentials.json and keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: node scripts/setup-credentials.js

      - name: Run EAS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'android' }}"
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          echo "Building platform=$PLATFORM profile=$PROFILE"
          eas build \
            --platform "$PLATFORM" \
            --profile "$PROFILE" \
            --non-interactive
