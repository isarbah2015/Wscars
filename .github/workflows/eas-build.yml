name: EAS Build (Android Production)

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/westcars/**'
      - '.github/workflows/eas-build.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development

# Shared concurrency group with eas-update.yml.
# cancel-in-progress: true means if a new full build is triggered, any
# running or queued OTA update in the same group is cancelled immediately.
concurrency:
  group: westcars-eas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/westcars

    steps:
      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.EXPO_TOKEN }}" ]       && missing="$missing EXPO_TOKEN"
          [ -z "${{ secrets.KEYSTORE_B64 }}" ]     && missing="$missing KEYSTORE_B64"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && missing="$missing KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_PASSWORD }}" ]      && missing="$missing KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub secrets:$missing"
            echo "Set these under: Settings → Secrets and variables → Actions"
            echo "See .local/notes/eas-build-workflow.md for instructions."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        run: pnpm add -g eas-cli

      - name: Run EAS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EAS_NO_VCS: '1'
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'android' }}"
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas build \
            --platform "$PLATFORM" \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait
